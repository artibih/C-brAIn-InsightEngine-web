<div class="likert" [class.likert--error]="showError && !selectedValue">
  <p class="likert__label">{{ label }}</p>
  <div class="likert__options">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="likert__option"
        [class.likert__option--selected]="selectedValue === option.value"
        [disabled]="disabled"
        (click)="select(option.value)"
      >
        <span class="likert__option-full">{{ option.label }}</span>
        <span class="likert__option-short">{{ option.shortLabel }}</span>
      </button>
    }
  </div>
  @if (showError && !selectedValue) {
    <p class="likert__error">Please select a rating</p>
  }
</div>
